# Sobe PostgreSQL e Redis para desenvolvimento local.
# Uso: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bacalhau
      POSTGRES_PASSWORD: bacalhau
      POSTGRES_DB: bacalhau
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
