# Fly.io — backend NestJS do Bacalhau Manager.
# Deploy a partir da raiz do repo:  flyctl deploy
# O nome do app é definido no `flyctl launch`/`flyctl apps create`.

app = "bacalhau-manager-api"
primary_region = "gru" # São Paulo

[build]
  dockerfile = "backend/Dockerfile"

# Roda as migrations do Prisma antes de cada release (máquina temporária).
[deploy]
  release_command = "sh -c 'cd /app/backend && npx prisma migrate deploy'"

[env]
  PORT = "8080"
  # Prefixo global da API definido em main.ts (app.setGlobalPrefix('api')).
  # A nuvem só ENFILEIRA os pedidos; quem imprime é o agente local no PC do
  # caixa (PRINT_WORKER=on lá). Aqui o worker fica desligado — sem acesso às
  # impressoras da rede local do restaurante.
  PRINT_WORKER = "off"

[http_service]
  internal_port = 8080
  force_https = true
  # NÃO hibernar: o gateway WebSocket (socket.io) e o worker da fila
  # BullMQ precisam de um processo vivo 24/7. Escala-a-zero quebraria os
  # pedidos em tempo real.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    # Ajuste se criar um endpoint /health dedicado; /api responde 404 mas
    # confirma que o processo está de pé.
    path = "/api"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb" # Nest + Prisma + BullMQ não cabem bem em 256mb.
  cpus = 1
